name: Deploy playground to Azure Static Web Apps

# Builds the Blazor WebAssembly playground and uploads the static output to
# Azure Static Web Apps. We build with setup-dotnet (not the built-in Oryx
# build) so the .NET 10 SDK is available, then deploy the pre-built files.

on:
  push:
    branches: [ master ]
    paths:
      - 'samples/Playground/**'
      - 'src/FrontEnd/**'
      - '.github/workflows/deploy-playground.yml'
  workflow_dispatch:

jobs:
  build_and_deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Blazor WASM
        run: dotnet publish samples/Playground/Orchid.Playground.csproj -c Release -o publish

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: publish/wwwroot
          output_location: ''
          skip_app_build: true
          skip_api_build: true
